$kind: http-request
name: 'Health Check'
method: POST
url: 'http://localhost:3002/graphql'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {"query": "query { healthCheck }"}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Health check returns true", () => {
        pm.expect(pm.response.json().data.healthCheck).to.be.true;
      });
