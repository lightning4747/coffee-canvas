$kind: http-request
name: 'Get Room Info – No Auth Token'
method: POST
url: 'http://localhost:3002/graphql'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {"query": "query GetRoomInfo($roomId: String!) { getRoomInfo(roomId: $roomId) { id } }", "variables": { "roomId": "{{room_id}}" }}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Returns authentication error", () => {
        const json = pm.response.json();
        pm.expect(json.errors).to.be.an('array').and.not.empty;
      });
