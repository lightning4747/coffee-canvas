$kind: http-request
name: 'Get Canvas History – Empty Chunks'
method: POST
url: 'http://localhost:3002/graphql'
order: 5000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {"query": "query GetCanvasHistory($input: CanvasHistoryInput!) { getCanvasHistory(input: $input) { events { id } hasMore } }", "variables": { "input": { "roomId": "{{room_id}}", "chunks": [] } }}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Returns empty events for empty chunks", () => {
        const page = pm.response.json().data.getCanvasHistory;
        pm.expect(page.events).to.be.an('array').and.empty;
        pm.expect(page.hasMore).to.be.false;
      });
