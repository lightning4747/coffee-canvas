$kind: http-request
name: 'Get Room Info (Authenticated)'
method: POST
url: 'http://localhost:3002/graphql'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{auth_token}}'
body:
  type: json
  content: |-
    {"query": "query GetRoomInfo($roomId: String!) { getRoomInfo(roomId: $roomId) { id code name capacity createdAt participantCount } }", "variables": { "roomId": "{{room_id}}" }}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("No GraphQL errors", () => {
        const json = pm.response.json();
        pm.expect(json.errors).to.be.undefined;
      });
      pm.test("Room ID matches", () => {
        pm.expect(pm.response.json().data.getRoomInfo.id).to.eql(pm.collectionVariables.get("room_id"));
      });
