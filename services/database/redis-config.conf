# Coffee & Canvas Redis Configuration
# Optimized for real-time collaborative drawing with TTL policies

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================

# Maximum memory limit (adjust based on deployment)
maxmemory 512mb

# LRU eviction policy for memory management
maxmemory-policy allkeys-lru

# Enable keyspace notifications for TTL events
notify-keyspace-events Ex

# ============================================================================
# PERSISTENCE SETTINGS
# ============================================================================

# Enable AOF for better durability of active strokes
appendonly yes
appendfsync everysec

# RDB snapshots for backup
save 900 1
save 300 10
save 60 10000

# ============================================================================
# NETWORKING AND PERFORMANCE
# ============================================================================

# TCP keepalive
tcp-keepalive 300

# Timeout for idle clients (5 minutes)
timeout 300

# Maximum number of clients
maxclients 10000

# ============================================================================
# LOGGING
# ============================================================================

# Log level for production monitoring
loglevel notice

# ============================================================================
# SECURITY (for production)
# ============================================================================

# Require authentication (set via environment variable)
# requirepass ${REDIS_PASSWORD}

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""